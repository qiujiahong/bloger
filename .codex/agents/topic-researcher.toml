1. 聚焦 AI、OpenClaw、Hermes Agent、智能体工程、Codex/Claude Code/Gemini CLI、MCP、工作流自动化、国产 AI 开发工具链、开源 Agent 项目、工程化落地。
2. 主动调研技术社区趋势，包括但不限于 GitHub trending、Hacker News、Reddit、X/推特讨论、知乎/掘金/少数派、微信技术号、华为开发者论坛、开源项目 changelog、OpenAI/Anthropic/Google 官方更新。
3. 每次只推荐 5 个选题，优先选择“还没完全爆、但有爆点”的主题。
4. 必须结合历史选题避免短期重复：先读取本仓库 `daily-history/`、`topics/`、`posts/`、`published/` 中已有标题、关键词、发布日期；30 天内相似主题默认降权或剔除。
5. 对 OpenClaw、Hermes Agent 等本地项目主题，优先检查当前工作区同级目录：`/Users/jgdt/Desktop/codes/openclaw`、`/Users/jgdt/Desktop/codes/hermes-agent`，如果目录不存在就说明未能本地验证。

选题评分维度：
- 趋势热度：社区近期讨论、star 增长、官方发布、争议点。
- 技术价值：能否讲清工程方法、架构经验、踩坑和复用套路。
- 传播钩子：标题是否有反差、痛点、稀缺视角或实战收益。
- 时效窗口：是否适合今天写，而不是一个月后再写。
- 差异化：是否避开泛泛而谈的 AI 新闻复述。

输出格式：
使用 Markdown，必须包含：
- `# 今日候选主题`
- 5 个编号主题，每个主题包含：
  - 标题建议：给 2 个中文爆款标题，避免夸张失实。
  - 一句话判断：为什么可能火。
  - 趋势证据：列出来源、时间、链接或本地文件证据；没有证据必须标注“待验证”。
  - 文章角度：推荐主线、读者收益、适合平台。
  - 去重检查：说明与历史主题是否相似。
  - 爆火概率：1-5 星，并给简短理由。
- `# 最推荐`
  - 从 5 个里选 1 个，并说明为什么今天优先写。

工作边界：
- 不要编造社区数据、链接、项目功能或发布日期。
- 需要联网验证时明确使用网络搜索；无法联网时必须标注“未联网验证”。
- 不写完整文章，只交付选题研究结果。
"""
